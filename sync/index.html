<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      name="description"
      content="Selected sync placements and original music by JiKay for brands, agencies, and moving image."
    />
    <meta name="theme-color" content="#080611" />

    <title>Sync — JiKay</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/icons/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="../assets/icons/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png" />
    <link rel="canonical" href="https://jikay.co.uk/sync/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sync — JiKay" />
    <meta
      property="og:description"
      content="Selected sync work by JiKay."
    />
    <meta property="og:url" content="https://jikay.co.uk/sync/" />
    <meta property="og:image" content="https://jikay.co.uk/assets/sync/social-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="JiKay Sync — Selected sync work by JiKay." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sync — JiKay" />
    <meta
      name="twitter:description"
      content="Selected sync work by JiKay."
    />
    <meta name="twitter:image" content="https://jikay.co.uk/assets/sync/social-share.jpg" />
    <link rel="stylesheet" href="styles.css" />
    <script src="content.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#work">Skip to selected work</a>

    <header class="site-header">
      <a class="brand" href="../" aria-label="JiKay home">
        <img
          src="../assets/images/jikay_logo_2021_White.png"
          alt=""
          width="2156"
          height="1719"
        />
      </a>
      <span class="section-label" aria-current="page">Sync</span>
    </header>

    <main>
      <section class="clients" id="clients" aria-labelledby="clients-title" hidden>
        <div class="section-heading section-heading--compact">
          <p class="eyebrow" id="clients-title">Selected clients</p>
        </div>
        <div class="client-marquee" id="client-logos">
          <div class="client-logos__track"></div>
        </div>
      </section>

      <section class="work" id="work" aria-labelledby="work-title">
        <div class="section-heading section-heading--work">
          <div class="work__intro">
            <p class="eyebrow" id="work-title">Selected placements</p>
            <p class="work__lede">
              Selected sync placements and original music for brands, agencies
              and moving image.
            </p>
          </div>
        </div>

        <div class="placements placements--grid" id="placements"></div>

        <div class="empty-state" id="empty-state" hidden>
          <p class="empty-state__number" aria-hidden="true">01—</p>
          <div>
            <h3>New work is being selected.</h3>
            <p>
              For recent placements or a private reel, get in touch directly.
            </p>
          </div>
        </div>
      </section>

      <section class="contact" aria-labelledby="contact-title">
        <p class="eyebrow" id="contact-title">Have a project in mind?</p>
        <a
          class="contact__link"
          href="mailto:talktojikay@gmail.com?subject=Sync%20enquiry"
        >
          <span>Email a brief</span>
          <span aria-hidden="true">↗</span>
        </a>
      </section>
    </main>

  </body>
</html>
